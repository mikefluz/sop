<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolånehjälpen Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #06b6d4; --bg: #030712; --sidebar: #111827; --text: #f9fafb; --text-soft: #9ca3af; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow: hidden; height: 100vh; }

        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center;
            background-image: radial-gradient(circle at center, #1e1b4b 0%, #030712 100%);
        }
        .login-card {
            background: rgba(17, 24, 39, 0.95); padding: 50px; border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px;
            text-align: center; backdrop-filter: blur(15px);
        }
        .login-logo { width: 65px; height: 65px; background: var(--primary); border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 25px; font-size: 34px; font-weight: 900; color: #000; }
        input { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); color: white; outline: none; text-align: center; font-size: 16px; margin-bottom: 20px; }
        .btn { background: var(--primary); color: #000; border: none; padding: 16px 30px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; font-size: 16px; }

        #app-shell { display: none; grid-template-columns: 280px 1fr; height: 100vh; }
        .sidebar { background: var(--sidebar); border-right: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; padding: 35px 20px; }
        .nav-item { padding: 15px 18px; border-radius: 12px; cursor: pointer; margin-bottom: 12px; color: var(--text-soft); display: flex; align-items: center; gap: 14px; font-weight: 600; transition: 0.2s; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: rgba(6, 182, 212, 0.15); color: var(--primary); }
        iframe { width: 100%; height: 100%; border: none; display: none; background: #fff; }
        iframe.active { display: block; }
        #err-msg { color: #ef4444; font-size: 14px; margin-top: 15px; display: none; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="login-overlay">
        <div class="login-card">
            <div class="login-logo">B</div>
            <h1>Bolånehjälpen</h1>
            <input type="password" id="pass-input" placeholder="Lösenord">
            <button class="btn" onclick="check()">LOGGA IN</button>
            <p id="err-msg">Fel lösenord</p>
        </div>
    </div>

    <div id="app-shell">
        <div class="sidebar">
            <div style="font-weight: 800; font-size: 18px; margin-bottom: 40px; display: flex; align-items: center; gap: 10px;">
                <div style="width:30px; height:30px; background:var(--primary); border-radius:6px; color:#000; text-align:center; line-height:30px;">B</div> Bolånehjälpen
            </div>
            <!-- Här har vi uppdaterat namnen på knapparna -->
            <div class="nav-item active" id="btn0" onclick="tab(0)">📊 Låneupplägg</div>
            <div class="nav-item" id="btn1" onclick="tab(1)">🛡️ Försäkringserbjudande</div>
        </div>
        <div style="flex-grow:1; background:#fff;">
            <!-- Här har vi kopplat in dina filer i iframes -->
            <iframe id="app0" src="laneupplagg.html" class="active"></iframe>
            <iframe id="app1" src="forsakringar.html"></iframe>
        </div>
    </div>

    <script>
        function check() {
            // Lösenordet är fortfarande 'Bolan2024' som i ditt original
            if(document.getElementById('pass-input').value === 'Bolan2024') {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-shell').style.display = 'grid';
                sessionStorage.setItem('auth', 'true');
            } else { document.getElementById('err-msg').style.display = 'block'; }
        }
        function tab(i) {
            document.querySelectorAll('iframe').forEach((f, idx) => { f.classList.toggle('active', idx === i); });
            document.querySelectorAll('.nav-item').forEach((b, idx) => { b.classList.toggle('active', idx === i); });
        }
        // Hindra högerklick och F12 för en mer "låst" känsla
        document.addEventListener('keydown', e => { if(e.keyCode==123 || (e.ctrlKey && e.shiftKey && e.keyCode==73) || (e.ctrlKey && e.keyCode==85)) e.preventDefault(); });
    </script>
</body>
</html>
