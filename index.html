<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LåneLabbet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #06b6d4;
            --bg: #020617;
            --sidebar: #0f172a;
            --text-soft: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

        /* --- LOADER (Samma som innan) --- */
        #loader-container {
            position: fixed; inset: 0; z-index: 10000; background: #000; 
            display: none; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }
        #data-canvas { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0.15; }
        .loader-box { position: relative; width: 260px; text-align: center; z-index: 10; }
        .progress-wrapper { width: 100%; height: 1px; background: rgba(255,255,255,0.05); position: relative; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--primary); box-shadow: 0 0 15px var(--primary); transition: width 0.3s ease; }

        /* --- LOGIN --- */
        #login-overlay {
            position: fixed; inset: 0; z-index: 9999; background: var(--bg);
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .login-card {
            background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px);
            padding: 40px 30px; border-radius: 24px; border: 1px solid var(--border);
            width: 100%; max-width: 380px; text-align: center;
        }
        input {
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border);
            background: rgba(0,0,0,0.4); color: white; outline: none; text-align: center;
            font-size: 16px; margin-top: 20px;
        }
        .btn-login {
            background: var(--primary); color: #000; border: none; padding: 14px;
            border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%;
            font-size: 14px; margin-top: 15px;
        }

        /* --- APP LAYOUT --- */
        #app-shell { 
            display: none; 
            flex: 1;
            height: 100%;
        }

        /* Top Bar (Endast Mobil) */
        .mobile-header {
            display: none;
            height: 60px;
            background: var(--sidebar);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            align-items: center;
            justify-content: space-between;
            z-index: 1001;
        }

        /* Sidebar (Desktop & Mobil-drawer) */
        .sidebar { 
            background: var(--sidebar); 
            border-right: 1px solid var(--border); 
            padding: 32px 20px; 
            display: flex; 
            flex-direction: column;
            width: 280px;
            height: 100%;
            transition: transform 0.3s ease;
        }

        .nav-item { 
            padding: 14px 16px; border-radius: 12px; cursor: pointer; 
            color: var(--text-soft); font-weight: 600; margin-bottom: 6px; font-size: 14px; 
        }
        .nav-item.active { background: var(--primary); color: #000; }

        .main-view { 
            flex: 1;
            background: #fff; 
            margin: 10px; 
            border-radius: 20px; 
            overflow: hidden;
            position: relative;
        }
        
        iframe { width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }

        /* --- RESPONSIVITET --- */
        @media (min-width: 901px) {
            #app-shell { display: grid; grid-template-columns: 280px 1fr; }
        }

        @media (max-width: 900px) {
            #app-shell { display: flex; flex-direction: column; }
            .mobile-header { display: flex; }
            
            .sidebar {
                position: fixed;
                left: 0;
                top: 60px;
                bottom: 0;
                transform: translateX(-100%); /* Dold som standard */
                z-index: 1000;
                width: 100%; /* Tar hela bredden på mobil för att vara tydlig */
            }
            .sidebar.open { transform: translateX(0); }
            
            .main-view { margin: 0; border-radius: 0; }
        }

        .hamburger {
            cursor: pointer; font-size: 24px; color: var(--primary);
        }

        .shake { animation: shake 0.4s ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- Loader -->
    <div id="loader-container">
        <canvas id="data-canvas"></canvas>
        <div class="loader-box">
            <div style="font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--primary); margin-bottom:10px;">SYSTEM_INIT</div>
            <div class="progress-wrapper"><div id="progress-bar"></div></div>
            <div id="perc-display" style="font-family: 'JetBrains Mono', monospace; font-size:10px; margin-top:10px; color:var(--primary);">0%</div>
        </div>
    </div>

    <!-- Login -->
    <div id="login-overlay">
        <form class="login-card" onsubmit="handleLogin(event)">
            <div style="width:50px; height:50px; background:var(--primary); border-radius:12px; margin:0 auto 20px; display:flex; align-items:center; justify-content:center; color:#000; font-weight:900; font-size:24px;">L</div>
            <h1 style="font-size:24px; letter-spacing:-1px;">LåneLabbet</h1>
            <input type="password" id="pass-input" placeholder="PASSCODE" autofocus autocomplete="off">
            <button type="submit" class="btn-login">LOGGA IN</button>
        </form>
    </div>

    <!-- Mobil Header -->
    <header class="mobile-header">
        <div style="font-weight:800; font-size:18px;">LåneLabbet</div>
        <div class="hamburger" onclick="toggleMenu()">☰</div>
    </header>

    <!-- App Content -->
    <div id="app-shell">
        <aside class="sidebar" id="sidebar">
            <div style="font-weight:800; font-size:20px; letter-spacing:-1px; margin-bottom:40px; padding:0 10px;" class="hide-mobile">LåneLabbet</div>
            <div class="nav-item active" id="nav0" onclick="switchTab(0)">📊 Låneupplägg</div>
            <div class="nav-item" id="nav1" onclick="switchTab(1)">🛡️ Försäkringar</div>
            <div style="flex-grow:1"></div>
            <div class="nav-item" style="color:#f43f5e; opacity:0.8; font-size:12px;" onclick="logout()">Logga ut</div>
        </aside>

        <main class="main-view">
            <iframe id="frame0" src="laneupplagg.html" class="active"></iframe>
            <iframe id="frame1" src="forsakringar.html"></iframe>
        </main>
    </div>

    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
            // Byt ikon mellan meny och stäng
            document.querySelector('.hamburger').textContent = sidebar.classList.contains('open') ? '✕' : '☰';
        }

        function handleLogin(e) {
            e.preventDefault();
            if(document.getElementById('pass-input').value === "Bolan2024") {
                sessionStorage.setItem('lab_auth', 'true');
                startLoading();
            } else {
                const card = document.querySelector('.login-card');
                card.classList.add('shake');
                setTimeout(() => card.classList.remove('shake'), 400);
            }
        }

        function startLoading() {
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('loader-container').style.display = 'flex';
            initHexStream();
            
            let progress = 0;
            const bar = document.getElementById('progress-bar');
            const percText = document.getElementById('perc-display');
            
            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 20);
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    completeLoading();
                }
                bar.style.width = progress + "%";
                percText.textContent = progress + "%";
            }, 200);
        }

        function completeLoading() {
            setTimeout(() => {
                document.getElementById('loader-container').style.opacity = '0';
                document.getElementById('app-shell').style.display = window.innerWidth > 900 ? 'grid' : 'flex';
                setTimeout(() => { document.getElementById('loader-container').style.display = 'none'; }, 800);
            }, 400);
        }

        function switchTab(idx) {
            document.querySelectorAll('iframe').forEach((f, i) => f.classList.toggle('active', i === idx));
            document.querySelectorAll('.nav-item').forEach((b, i) => { if(i<2) b.classList.toggle('active', i === idx); });
            localStorage.setItem('lastTab', idx);
            
            // Om vi är på mobil, stäng menyn efter val
            if (window.innerWidth <= 900) {
                toggleMenu();
            }
        }

        function initHexStream() {
            const canvas = document.getElementById('data-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const hex = "0123456789ABCDEF";
            const drops = Array(Math.floor(canvas.width / 10)).fill(1);
            setInterval(() => {
                ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#06b6d4";
                ctx.font = "10px monospace";
                drops.forEach((y, i) => {
                    const text = hex[Math.floor(Math.random() * hex.length)];
                    ctx.fillText(text, i * 10, y * 10);
                    if (y * 10 > canvas.height && Math.random() > 0.98) drops[i] = 0;
                    drops[i]++;
                });
            }, 30);
        }

        function logout() { sessionStorage.removeItem('lab_auth'); location.reload(); }

        window.onload = () => {
            if(sessionStorage.getItem('lab_auth') === 'true') {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-shell').style.display = window.innerWidth > 900 ? 'grid' : 'flex';
            }
            const lastTab = localStorage.getItem('lastTab');
            if (lastTab) switchTab(parseInt(lastTab));
        };
    </script>
</body>
</html>
