<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolånehjälpen – Intern Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #06b6d4; --bg: #030712; --sidebar: #111827; --text: #f9fafb; --text-soft: #9ca3af; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); overflow: hidden; height: 100vh; user-select: none; }

        /* LOGIN SCREEN */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center;
            background-image: radial-gradient(circle at center, #1e1b4b 0%, #030712 100%);
        }
        .login-card {
            background: rgba(17, 24, 39, 0.95); padding: 50px; border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px;
            text-align: center; backdrop-filter: blur(15px); box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        .login-logo {
            width: 65px; height: 65px; background: var(--primary); border-radius: 18px;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 25px;
            font-size: 34px; font-weight: 900; color: #000; box-shadow: 0 0 30px rgba(6, 182, 212, 0.3);
        }
        input[type="password"] {
            width: 100%; padding: 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.5); color: white; outline: none; text-align: center; font-size: 16px; margin-bottom: 20px;
        }
        .btn {
            background: var(--primary); color: #000; border: none; padding: 16px 30px;
            border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; font-size: 16px;
        }

        /* MAIN APP SHELL */
        #app-shell { display: none; grid-template-columns: 280px 1fr; height: 100vh; }
        .sidebar { background: var(--sidebar); border-right: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; padding: 35px 20px; }
        .logo-area { display: flex; align-items: center; gap: 15px; margin-bottom: 45px; padding-left: 10px; }
        .logo-small { width: 38px; height: 38px; background: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #000; font-size: 20px; }
        .nav-item { padding: 15px 18px; border-radius: 12px; cursor: pointer; margin-bottom: 12px; transition: all 0.2s; color: var(--text-soft); display: flex; align-items: center; gap: 14px; font-weight: 600; }
        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: rgba(6, 182, 212, 0.12); color: var(--primary); border: 1px solid rgba(6, 182, 212, 0.2); }
        .content-area { background: #fff; position: relative; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        iframe.active { display: block; }
        #err-msg { color: #ef4444; font-size: 14px; margin-top: 15px; display: none; font-weight: 500; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="login-overlay">
        <div class="login-card">
            <div class="login-logo">B</div>
            <h1 style="margin-bottom:10px;">Bolånehjälpen</h1>
            <input type="password" id="pass-input" placeholder="Ange lösenord" autofocus>
            <button class="btn" onclick="unlock()">LOGGA IN</button>
            <p id="err-msg">Ogiltigt lösenord</p>
        </div>
    </div>

    <div id="app-shell">
        <div class="sidebar">
            <div class="logo-area">
                <div class="logo-small">B</div>
                <div>
                    <div style="font-weight: 800; font-size: 16px;">Bolånehjälpen</div>
                    <div style="font-size: 9px; color: var(--primary); font-weight: 800;">PRO SUITE</div>
                </div>
            </div>
            <div class="nav-item active" id="btn-0" onclick="showApp(0)">📊 Lånekalkylator</div>
            <div class="nav-item" id="btn-1" onclick="showApp(1)">📧 Mejlgenerator</div>
            <div style="margin-top:auto; font-size:10px; color:#4b5563;">BEHÖRIGHET: INTERN<br>© 2024 Bolånehjälpen</div>
        </div>
        <div class="content-area">
            <iframe id="app-0" class="active"></iframe>
            <iframe id="app-1"></iframe>
        </div>
    </div>

    <script>
        // --- SÄKERHETSKONFIGURATION ---
        const P_DATA = "Qm9sYW4yMDI0"; // Krypterat lösenord för att dölja det i källkoden

        function unlock() {
            const input = document.getElementById('pass-input').value;
            if (btoa(input) === P_DATA) {
                document.getElementById('login-overlay').style.display = 'none';
                document.getElementById('app-shell').style.display = 'grid';
                initApps();
            } else {
                document.getElementById('err-msg').style.display = 'block';
                document.getElementById('pass-input').value = "";
            }
        }

        // Hanterar Enter-tryck
        document.getElementById('pass-input').addEventListener('keypress', e => { if(e.key === 'Enter') unlock(); });

        // Unicode-säker Base64-avkodning (Viktigt för ÅÄÖ)
        function b64DecodeUnicode(str) {
            return decodeURIComponent(atob(str).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
        }

        function initApps() {
            // App 1: Lånekalkylatorn
            document.getElementById('app-0').srcdoc = b64DecodeUnicode(APP_1_CODE);
            // App 2: Mejlgeneratorn
            document.getElementById('app-1').srcdoc = b64DecodeUnicode(APP_2_CODE);
        }

        function showApp(idx) {
            document.querySelectorAll('iframe').forEach((f, i) => {
                f.classList.toggle('active', i === idx);
                document.getElementById('btn-' + i).classList.toggle('active', i === idx);
            });
        }

        // --- GLOBAL SPÄRR MOT KOPIERING ---
        document.addEventListener('keydown', e => {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85) || (e.ctrlKey && e.keyCode == 83)) {
                e.preventDefault();
                return false;
            }
        });
