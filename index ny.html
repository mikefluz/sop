<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolånehjälpen – Intern Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #06b6d4;
            --bg: #030712;
            --sidebar: #111827;
            --text: #f9fafb;
            --text-soft: #9ca3af;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            overflow: hidden; 
            height: 100vh;
            user-select: none;
        }

        /* LOGIN SCREEN */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-image: radial-gradient(circle at center, #1e1b4b 0%, #030712 100%);
        }

        .login-card {
            background: rgba(17, 24, 39, 0.95); padding: 50px; border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px;
            text-align: center; backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .login-logo {
            width: 65px; height: 65px; background: var(--primary); border-radius: 18px;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 25px;
            font-size: 34px; font-weight: 900; color: #000;
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.3);
        }

        .input-group { margin: 30px 0 20px; }

        input[type="password"] {
            width: 100%; padding: 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.5); color: white; outline: none; 
            text-align: center; font-size: 16px; transition: all 0.2s;
        }

        input[type="password"]:focus { border-color: var(--primary); background: rgba(0,0,0,0.7); }

        .btn {
            background: var(--primary); color: #000; border: none; padding: 16px 30px;
            border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%;
            font-size: 16px; transition: transform 0.2s;
        }

        /* MAIN APP SHELL */
        #app-shell { display: none; grid-template-columns: 280px 1fr; height: 100vh; }

        .sidebar {
            background: var(--sidebar); border-right: 1px solid rgba(255,255,255,0.08);
            display: flex; flex-direction: column; padding: 35px 20px;
        }

        .logo-area { display: flex; align-items: center; gap: 15px; margin-bottom: 45px; padding-left: 10px; }
        
        .logo-small {
            width: 38px; height: 38px; background: var(--primary); border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-weight: 900; color: #000; font-size: 20px;
        }

        .nav-item {
            padding: 15px 18px; border-radius: 12px; cursor: pointer; margin-bottom: 12px;
            transition: all 0.2s; color: var(--text-soft); display: flex; align-items: center; gap: 14px;
            font-weight: 600; font-size: 15px;
        }

        .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-item.active { background: rgba(6, 182, 212, 0.12); color: var(--primary); border: 1px solid rgba(6, 182, 212, 0.2); }

        .content-area { background: #fff; position: relative; }
        
        #app-viewport { width: 100%; height: 100%; border: none; }

        .footer-tag { margin-top: auto; padding: 20px; border-top: 1px solid rgba(255,255,255,0.05); font-size: 10px; color: #4b5563; }

        #err-msg { color: #ef4444; font-size: 14px; margin-top: 15px; display: none; font-weight: 500; }

    </style>
</head>
